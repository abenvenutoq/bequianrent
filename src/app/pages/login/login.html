<div class="bg-primary text-white py-4 mb-4 text-center header-global">
    <h2 class="fw-bold"><i class="fa-solid fa-user-lock me-2"></i>Bienvenido de  nuevo!</h2>
    <p class="text-white">Ingresa a tu cuenta de BequianRent</p>
</div>

<div class="container my-1 py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-6 col-md-10"> 
            <div class="card shadow-lg border-0 login-container">
                                    
                <div class="card-body p-4 p-md-5">
    
                    <div *ngIf="mensaje && !enviado" class="alert alert-danger text-center animate__animated animate__fadeIn" role="alert">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i> {{ mensaje }}
                    </div>

                    <div *ngIf="mensaje && enviado" class="alert alert-success text-center animate__animated animate__fadeIn" role="alert">
                        <i class="fa-solid fa-circle-check me-2"></i> {{ mensaje }}
                    </div>

                    <form (ngSubmit)="iniciarSesion()" #formLogin="ngForm" novalidate>
                        <div class="mb-4">
                            <label for="login-correo" class="form-label fw-semibold">Correo Electrónico</label>
                            <input
                                class="form-control"
                                id="login-correo"
                                placeholder="correo@correo.cl"
                                type="email"
                                name="correo"
                                required
                                [(ngModel)]="correo"
                                #correoInput="ngModel"
                                [ngClass]="{'is-invalid': correoInput.invalid && (correoInput.dirty || correoInput.touched)}"
                            >
                            <div class="invalid-feedback" *ngIf="correoInput.errors?.['required']">
                                El correo es obligatorio.
                            </div>
                            <div class="invalid-feedback" *ngIf="correoInput.errors?.['email']">
                                Introduce un correo válido con @.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="login-password" class="form-label fw-semibold">Contraseña</label>
                            <input
                                type="password"
                                class="form-control"
                                id="login-password"
                                name="password"
                                placeholder="••••••••"
                                required
                                [(ngModel)]="password"
                                #passwordInput="ngModel"
                                [ngClass]="{'is-invalid': passwordInput.invalid && (passwordInput.dirty || passwordInput.touched)}"
                            >
                            <div class="invalid-feedback">
                                La contraseña no puede estar vacía.
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="recordarme">
                                <label class="form-check-label text-muted" for="recordarme">Recordarme</label>
                            </div>
                            <a href="#" class="text-decoration-none text-primary fw-semibold" data-bs-toggle="modal" data-bs-target="#modalRecuperar">¿Olvidaste tu contraseña?</a>
                        </div>
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary fw-bold py-2 shadow-sm" [disabled]="formLogin.invalid">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>Iniciar Sesión
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
