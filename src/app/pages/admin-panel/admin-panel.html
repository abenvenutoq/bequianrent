<div class="bg-primary text-white py-4 mb-4 text-center header-global">
    <h2 class="fw-bold"><i class="fa-solid fa-users-gear me-2"></i>Panel Administración</h2>
    <p class="text-white">Panel de gestión y control de BequianRent</p>
</div>

<div class="container my-5">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0 p-3 bg-white mb-4" style="border-radius: 10px;">
                <div class="d-flex flex-column gap-2">
                    <button class="btn w-100 text-start fw-semibold py-2" 
                            [ngClass]="vistaActual === 'usuarios' ? 'btn-primary' : 'btn-light'"
                            (click)="cambiarVista('usuarios')">
                        <i class="fa-solid fa-users me-2"></i>Usuarios Registrados
                    </button>
                    <button class="btn w-100 text-start fw-semibold py-2" 
                            [ngClass]="vistaActual === 'reservas' ? 'btn-primary' : 'btn-light'"
                            (click)="cambiarVista('reservas')">
                        <i class="fa-solid fa-calendar-days me-2"></i>Reservas Realizadas
                    </button>
                    <button class="btn w-100 text-start fw-semibold py-2" 
                            [ngClass]="vistaActual === 'vehiculos' ? 'btn-primary' : 'btn-light'"
                            (click)="cambiarVista('vehiculos')">
                        <i class="fa-solid fa-car me-2"></i>Vehículos en Flota
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            
            <app-usuarios-tabla 
                *ngIf="vistaActual === 'usuarios'" 
                [listaUsuarios]="usuarios">
            </app-usuarios-tabla>

            <app-reservas-tabla 
                *ngIf="vistaActual === 'reservas'" 
                [listaReservas]="reservas"
                [listaVehiculos]="vehiculos"
                (onEstadoCambiado)="actualizarEstadoReserva($event)">
            </app-reservas-tabla>

            <app-vehiculos-tabla 
                *ngIf="vistaActual === 'vehiculos'" 
                [listaVehiculos]="vehiculos">
            </app-vehiculos-tabla>

        </div>
    </div>
</div>
