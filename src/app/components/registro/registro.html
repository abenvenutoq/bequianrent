<div class="bg-primary text-white py-4 mb-4 text-center header-global">
    <h2 class="fw-bold"><i class="fa-solid fa-user-plus me-2"></i>Registro de Clientes</h2>
    <p class="text-white">Ingresa tus datos y comienza tu experiencia con nosotros</p>
</div>

<div class="container my-4">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">
            <div class="card shadow-lg border-0 form-container">
                <div class="card-body p-4 p-md-3">
                    
                    <div id="alert-success" class="alert alert-success d-none text-center animate-fade" role="alert">
                        <span id="success-message"></span>
                    </div>

                    <div id="alert-error" class="alert alert-danger d-none text-center animate-fade" role="alert">
                        Verifica los valores ingresados y los campos obligatorios
                    </div>

                    <form id="formRegistro" novalidate>
                        <div class="row g-4">
                            
                            <div class="col-12 col-md-6">
                                <label for="nombre" class="form-label fw-semibold">Nombre *</label>
                                <input type="text" class="form-control" id="nombre" placeholder="Juan">
                                <div class="invalid-feedback" id="nombre-error"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="apellido" class="form-label fw-semibold">Apellido *</label>
                                <input type="text" class="form-control" id="apellido" placeholder="Pérez">
                                <div class="invalid-feedback" id="apellido-error"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="rut" class="form-label fw-semibold">RUT *</label>
                                <input type="text" class="form-control" id="rut" placeholder="12345678-K" maxlength="12">
                                <div class="invalid-feedback" id="rut-error"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="correo" class="form-label fw-semibold">Correo Electrónico *</label>
                                <input type="email" class="form-control" id="correo" placeholder="juan.perez@example.com">
                                <div class="invalid-feedback" id="correo-error"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="telefono" class="form-label fw-semibold">Teléfono *</label>
                                <div class="input-group">
                                    <span class="input-group-text">+56</span>
                                    <input type="tel" class="form-control" id="telefono" placeholder="912345678" maxlength="9">
                                    <div class="invalid-feedback" id="telefono-error"></div>
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="direccion" class="form-label fw-semibold">Dirección (Opcional)</label>
                                <input type="text" class="form-control" id="direccion" placeholder="Av. Siempre Viva 742">
                                <div class="invalid-feedback" id="direccion-error"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="password" class="form-label fw-semibold">Contraseña *</label>
                                <div class="input-group has-validation">
                                    <input type="password" class="form-control" id="password" placeholder="••••••••">
                                    <span class="input-group-text user-select-none" id="ojo-password" style="cursor: pointer;"><i class="fa-solid fa-eye"></i></span>
                                    
                                    <div class="invalid-feedback" id="password-error">
                                        Debe ser entre 8 y 16 caracteres, incluir 1 mayúscula, 1 número y 1 carácter especial (!@#$%&*).
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="confirmPassword" class="form-label fw-semibold">Repetir Contraseña *</label>
                                <div class="input-group has-validation">
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••">
                                    <span class="input-group-text user-select-none" id="ojo-confirmPassword" style="cursor: pointer;"><i class="fa-solid fa-eye"></i></span>
                                    
                                    <div class="invalid-feedback" id="confirmPassword-error">Las contraseñas no coinciden.</div>
                                </div>
                            </div>

                        </div> <div class="mt-3 mb-4">
                            <small class="text-muted">* Campos obligatorios</small>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-3">
                            <button type="button" id="btnLimpiar" class="btn btn-outline-secondary px-4 me-md-2">Limpiar formulario</button>
                            <button type="submit" class="btn btn-primary px-5 btn-registrar">Registrar</button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
